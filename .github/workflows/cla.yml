name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/M1nexoff/nlluncher/blob/master/CLA.md'
          branch: 'master'
          allowlist: M1nexoff,bot*,dependabot[bot]
          custom-notsigned-prcomment: 'Thank you for your contribution. Before it can be merged, you must agree to the project''s [Contributor License Agreement](https://github.com/M1nexoff/nlluncher/blob/master/CLA.md). Please read it, then sign by posting the exact comment below in this pull request.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✍️'
